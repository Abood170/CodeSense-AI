<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review History – AI Code Reviewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --red:       #f85149;
      --orange:    #d29922;
      --yellow:    #e3b341;
      --green:     #3fb950;
      --purple:    #bc8cff;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      text-decoration: none;
    }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .3px; }
    .nav-links { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .nav-user { font-size: 12px; color: var(--muted); padding: 0 4px; }
    .nav-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid transparent;
      transition: color .2s, border-color .2s, background .2s;
    }
    .nav-btn:hover { color: var(--text); border-color: var(--border); background: var(--surface2); }
    .nav-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(88,166,255,.08); }
    .logout-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: inherit;
      transition: color .2s, border-color .2s;
    }
    .logout-btn:hover { color: var(--red); border-color: var(--red); }

    /* ── MAIN ── */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .page-title h2 { font-size: 20px; font-weight: 700; }
    .page-title .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td { padding: 13px 16px; font-size: 13px; vertical-align: middle; }

    .col-date { color: var(--muted); white-space: nowrap; font-size: 12px; }

    .lang-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(88,166,255,.1);
      color: var(--accent);
      border: 1px solid rgba(88,166,255,.25);
      text-transform: capitalize;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 13px;
    }
    .score-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .col-summary { color: var(--muted); max-width: 420px; }
    .col-summary span {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── EMPTY / LOADING ── */
    .state-box { text-align: center; padding: 64px 24px; color: var(--muted); }
    .state-box .state-icon { font-size: 40px; margin-bottom: 12px; }
    .state-box p { font-size: 13px; }
    .state-box a { color: var(--accent); text-decoration: none; }
    .state-box a:hover { text-decoration: underline; }

    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── AUTH OVERLAY ── */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 24px;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin: 0 auto 14px;
    }
    .auth-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .auth-header p  { font-size: 12px; color: var(--muted); }
    .auth-tabs {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      margin-bottom: 24px;
      gap: 3px;
    }
    .auth-tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s, color .2s;
    }
    .auth-tab.active { background: var(--surface); color: var(--text); }
    .auth-field { margin-bottom: 14px; }
    .auth-field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 6px;
    }
    .auth-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .auth-field input:focus { border-color: var(--accent); }
    .auth-field input::placeholder { color: var(--muted); opacity: .6; }
    .auth-submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      font-family: inherit;
      transition: opacity .2s;
    }
    .auth-submit:hover { opacity: .88; }
    .auth-submit:disabled { opacity: .45; cursor: not-allowed; }
    .auth-error {
      margin-top: 14px;
      color: var(--red);
      font-size: 13px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div id="auth-overlay" style="display:none">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🔍</div>
      <h2>AI Code Reviewer</h2>
      <p>Powered by Gemini</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
    </div>
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="auth-submit">Sign In</button>
    </form>
    <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
      <div class="auth-field">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="johndoe" required autocomplete="username" />
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="At least 6 characters" minlength="6" required />
      </div>
      <button type="submit" class="auth-submit">Create Account</button>
    </form>
    <p id="auth-error" class="auth-error"></p>
  </div>
</div>

<header>
  <a class="logo" href="/">🔍</a>
  <h1>AI Code Reviewer</h1>
  <nav class="nav-links">
    <span class="nav-user" id="nav-user"></span>
    <a href="/" class="nav-btn">Reviewer</a>
    <a href="/history.html" class="nav-btn active">History</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </nav>
</header>

<div class="container">

  <div class="page-title">
    <h2>Review History</h2>
    <span class="badge" id="count-badge">Loading…</span>
  </div>

  <div class="table-wrap" id="table-wrap">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Loading reviews…</p>
    </div>
  </div>

</div>

<script>
  // ── AUTH ─────────────────────────────────────────────────
  function getToken()    { return localStorage.getItem('jwt_token'); }
  function getUsername() { return localStorage.getItem('jwt_username'); }

  function initAuth() {
    if (!getToken()) {
      document.getElementById('auth-overlay').style.display = 'flex';
    } else {
      document.getElementById('nav-user').textContent = '👤 ' + getUsername();
      loadHistory();
    }
  }

  function switchTab(tab) {
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('auth-error').textContent = '';
  }

  function setAuthLoading(formId, loading) {
    const btn = document.querySelector('#' + formId + ' .auth-submit');
    btn.disabled    = loading;
    btn.textContent = loading ? 'Please wait…' : (formId === 'form-login' ? 'Sign In' : 'Create Account');
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    setAuthLoading('form-login', true);
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      storeAuth(data.token, data.username);
    } catch (err) {
      document.getElementById('auth-error').textContent = err.message;
    } finally {
      setAuthLoading('form-login', false);
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    setAuthLoading('form-register', true);
    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Registration failed');
      storeAuth(data.token, data.username);
    } catch (err) {
      document.getElementById('auth-error').textContent = err.message;
    } finally {
      setAuthLoading('form-register', false);
    }
  }

  function storeAuth(token, username) {
    localStorage.setItem('jwt_token',    token);
    localStorage.setItem('jwt_username', username);
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('nav-user').textContent = '👤 ' + username;
    loadHistory();
  }

  function logout() {
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('jwt_username');
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('nav-user').textContent = '';
    document.getElementById('login-email').value    = '';
    document.getElementById('login-password').value = '';
    document.getElementById('auth-error').textContent = '';
    switchTab('login');
  }

  function handleUnauthorized() {
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('jwt_username');
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('nav-user').textContent = '';
    document.getElementById('auth-error').textContent = 'Session expired. Please sign in again.';
  }

  // ── HISTORY TABLE ─────────────────────────────────────────
  function scoreColor(s) {
    if (s >= 7.5) return 'var(--green)';
    if (s >= 5)   return 'var(--yellow)';
    if (s >= 3)   return 'var(--orange)';
    return 'var(--red)';
  }

  function scoreLabel(s) {
    if (s >= 8)   return 'Excellent';
    if (s >= 6.5) return 'Good';
    if (s >= 5)   return 'Fair';
    if (s >= 3)   return 'Needs Work';
    return 'Critical';
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
      + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  function renderTable(reviews) {
    const wrap  = document.getElementById('table-wrap');
    const badge = document.getElementById('count-badge');

    badge.textContent = reviews.length + (reviews.length === 1 ? ' review' : ' reviews');

    if (reviews.length === 0) {
      wrap.innerHTML = `
        <div class="state-box">
          <div class="state-icon">📭</div>
          <p>No reviews yet. <a href="/">Review some code</a> to get started.</p>
        </div>`;
      return;
    }

    const rows = reviews.map(r => {
      const color = scoreColor(r.overallScore);
      const label = scoreLabel(r.overallScore);

      const summaryEl = document.createElement('span');
      summaryEl.textContent = r.summary || '—';
      const safeSummary = summaryEl.outerHTML;

      const langEl = document.createElement('span');
      langEl.textContent = r.language || '—';
      const safeLang = langEl.outerHTML;

      return `
        <tr>
          <td class="col-date">${formatDate(r.createdAt)}</td>
          <td><span class="lang-badge">${safeLang}</span></td>
          <td>
            <span class="score-pill">
              <span class="score-dot" style="background:${color}"></span>
              <span style="color:${color}">${r.overallScore.toFixed(1)}</span>
              <span style="color:var(--muted);font-weight:400;font-size:12px">${label}</span>
            </span>
          </td>
          <td class="col-summary">${safeSummary}</td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Language</th>
            <th>Score</th>
            <th>Summary</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function loadHistory() {
    try {
      const res = await fetch('/api/reviews', {
        headers: { 'Authorization': 'Bearer ' + getToken() }
      });
      if (res.status === 401) { handleUnauthorized(); return; }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      renderTable(data);
    } catch (e) {
      document.getElementById('table-wrap').innerHTML = `
        <div class="state-box">
          <div class="state-icon">⚠</div>
          <p>Failed to load reviews: ${e.message}</p>
        </div>`;
      document.getElementById('count-badge').textContent = 'Error';
    }
  }

  initAuth();
</script>
</body>
</html>
