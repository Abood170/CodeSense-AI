spring.application.name=code-reviewer

# Server port — Railway injects PORT dynamically; fall back to 8080 locally
server.port=${PORT:8080}

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:code_reviewer}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:123123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Error response
server.error.include-stacktrace=never
server.error.include-message=always

# JWT
jwt.secret=${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast32CharactersLong!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini API
gemini.api.key=${GEMINI_API_KEY:AIzaSyDnI9rsYtBF1dvh9yFoNkHdBwezeYyzWGo}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}
