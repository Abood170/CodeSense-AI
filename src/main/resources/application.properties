spring.application.name=code-reviewer

# Server port — Railway injects PORT dynamically; fall back to 8080 locally
server.port=${PORT:8080}

# PostgreSQL DataSource is configured programmatically in DataSourceConfig.java,
# which handles Railway's postgres:// URL format and the individual PG* env vars.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Error response
server.error.include-stacktrace=never
server.error.include-message=always

# JWT
jwt.secret=${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast32CharactersLong!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}
