spring.application.name=code-reviewer

# PostgreSQL — override via environment variables on Railway/production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/code_reviewer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Error response
server.error.include-stacktrace=never
server.error.include-message=always

# JWT
jwt.secret=${JWT_SECRET:YourSuperSecretKeyThatIsAtLeast32CharactersLong!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}
